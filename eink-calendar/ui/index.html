<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Time Blind Reminder</title>

<!-- Webfonts. The renderer's `document.fonts.ready` wait gates the screenshot
     on these landing — without it the PNG ships a fallback face. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&family=JetBrains+Mono:wght@500;700&display=swap">

<style>
  /* The render canvas is exactly the e-paper resolution.
     Open this file in a browser to preview the design.
     The Python renderer screenshots #canvas at 800x480. */
  html, body {
    margin: 0;
    padding: 0;
    background: #d0cec5;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  /* Mock device bezel — only visible in browser preview.
     The renderer ignores it (screenshots #canvas only). */
  .bezel {
    background: #2A2724;
    padding: 24px;
    border-radius: 22px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }

  /* The actual e-ink canvas. 800x480, fixed. */
  #canvas {
    width: 800px;
    height: 480px;
    background: #EFEBDF;
    color: #1F1B16;
    position: relative;
    overflow: hidden;
    font-feature-settings: "tnum" 1;
  }

  /* ============== Header strip ============== */
  .header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 72px;
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 2px solid #1F1B16;
    box-sizing: border-box;
  }
  .clock {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: #1F1B16;
  }
  .clock .ampm {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-left: 6px;
  }
  .header-sep {
    width: 2px;
    height: 24px;
    background: #1F1B16;
  }
  .date {
    font-size: 18px;
    font-weight: 600;
    color: #1F1B16;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ============== Left zone: NEXT hero ============== */
  .next-zone {
    position: absolute;
    top: 72px;
    left: 0;
    width: 504px;
    height: 408px;
    padding: 32px;
    box-sizing: border-box;
  }
  .next-label {
    font-size: 18px;
    font-weight: 600;
    color: #1F1B16;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .hero {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    padding: 8px 16px;
    margin: 0 -16px 12px -16px;
    border-radius: 6px;
    /* default: naked numerals on paper */
  }
  .hero.imminent {
    /* <5 min: full red panel, paper numerals — escalation tier 3. */
    background: #B83C2C;
  }
  .hero-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 200px;
    font-weight: 700;
    line-height: 1;
    color: #B83C2C;
    font-feature-settings: "tnum" 1, "zero" 1;
  }
  .hero.imminent .hero-num {
    color: #EFEBDF;
  }
  .hero-unit {
    font-size: 24px;
    font-weight: 600;
    color: #1F1B16;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding-bottom: 24px;
  }
  .hero.imminent .hero-unit {
    color: #EFEBDF;
  }
  .hero-bar-wrap {
    /* The depletion bar — visible only at <30 min and >=5 min.
       The bar's width is the only signal; no track. Bar shrinks
       as the next event approaches. */
    height: 6px;
    margin: 0 0 20px 0;
    overflow: hidden;
  }
  .hero-bar {
    height: 100%;
    background: #B83C2C;
    border-radius: 6px;
    width: 0;
  }
  .next-title {
    font-size: 32px;
    font-weight: 600;
    color: #1F1B16;
    line-height: 1.1;
    margin-bottom: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .next-meta {
    font-size: 18px;
    font-weight: 600;
    color: #1F1B16;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .next-meta .num {
    font-family: 'JetBrains Mono', monospace;
    font-feature-settings: "tnum" 1;
  }

  /* ============== Right rail: today timeline ============== */
  .rail {
    position: absolute;
    top: 72px;
    right: 0;
    width: 276px;
    height: 408px;
    padding: 24px 24px 24px 16px;
    box-sizing: border-box;
    border-left: 2px solid #1F1B16;
    overflow: hidden;
  }

  .hour-tick {
    position: absolute;
    left: 16px;
    width: 220px;
    font-size: 16px;
    font-weight: 600;
    color: #1F1B16;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
    /* baseline-aligns to the y-position of the hour */
    transform: translateY(-8px);
  }
  .hour-tick .num {
    font-family: 'JetBrains Mono', monospace;
    font-feature-settings: "tnum" 1;
    margin-right: 4px;
  }
  .hour-tick::after {
    content: "";
    position: absolute;
    left: 56px;
    right: 0;
    top: 8px;
    height: 2px;
    background: #1F1B16;
  }

  .event {
    position: absolute;
    left: 56px;
    right: 16px;
    padding: 8px 10px;
    border-radius: 6px;
    box-sizing: border-box;
    color: #1F1B16;
    background: #EFEBDF;
    border: 2px solid #1F1B16;
    overflow: hidden;
    display: flex;
    align-items: center;
  }
  .event-title {
    /* Title gets the truncation. text-overflow: ellipsis only works on
       block-level elements, so we wrap in a span and apply here. */
    display: block;
    width: 100%;
    font-size: 16px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .event.past {
    /* Completed events: outlined-only, dashed. Visually subordinate.
       Color #4A4540 quantizes to ink — paired with the dash, reads as past. */
    border: 2px dashed #4A4540;
    color: #4A4540;
    background: transparent;
  }
  .event.imminent {
    /* Next event within 30 min: full ink fill, paper text. */
    background: #1F1B16;
    color: #EFEBDF;
    border-color: #1F1B16;
  }
  .event.current {
    /* Right now: red border (the only red on the rail). */
    border: 3px solid #B83C2C;
    background: #EFEBDF;
    color: #1F1B16;
  }

  .now-marker {
    /* Red wedge on the rail's right edge at y=now.
       Sits in the rail's right padding so it never crosses event text.
       Width chosen to be glanceable from across a room without taking
       horizontal space from the event track. PRD-9's 40x40 floor applies
       to glanceable regions; this is a structural indicator (data-coded
       stroke), explicitly carved out by Principle 9 in the PRD. */
    position: absolute;
    right: 0;
    width: 12px;
    height: 40px;
    background: #B83C2C;
    transform: translateY(-20px);
    border-radius: 6px 0 0 6px;
  }
</style>
</head>
<body>

<div class="bezel">
  <div id="canvas">

    <!-- Header: clock + date -->
    <div class="header">
      <span class="clock"><span id="clock-time">10:37</span><span class="ampm" id="clock-ampm">AM</span></span>
      <span class="header-sep"></span>
      <span class="date" id="clock-date">Wed · Apr 29</span>
    </div>

    <!-- Left zone: NEXT hero -->
    <div class="next-zone">
      <div class="next-label" id="next-label">Next in</div>
      <div class="hero" id="hero">
        <span class="hero-num" id="hero-num">23</span>
        <span class="hero-unit" id="hero-unit">Min</span>
      </div>
      <div class="hero-bar-wrap" id="hero-bar-wrap">
        <div class="hero-bar" id="hero-bar" style="width: 0%;"></div>
      </div>
      <div class="next-title" id="next-title">Standup</div>
      <div class="next-meta" id="next-meta">at 11:00 · team-eng</div>
    </div>

    <!-- Right rail: today's timeline -->
    <div class="rail" id="rail">
      <!-- Populated by JS -->
    </div>

  </div>
</div>

<script>
const SAMPLE = {
  now: { hour: 10, minute: 37 },
  date: "Wed, Apr 29",
  workingHours: { start: 9, end: 17 },
  current: {
    title: "Design review with Sara",
    endHour: 10, endMinute: 50,
    minutesLeft: 13
  },
  next: {
    title: "Standup",
    startHour: 11, startMinute: 0,
    minutesUntil: 23,
    subtitle: "team-eng"
  },
  events: [
    { title: "Design review", startH: 10, startM: 0, endH: 10, endM: 50, state: "current" },
    { title: "Standup", startH: 11, startM: 0, endH: 11, endM: 15, state: "imminent" },
    { title: "Lunch", startH: 12, startM: 0, endH: 12, endM: 30, state: "normal" },
    { title: "Focus block", startH: 13, startM: 0, endH: 14, endM: 30, state: "normal" },
    { title: "1:1 with Alex", startH: 15, startM: 0, endH: 15, endM: 30, state: "normal" }
  ]
};

function render(data) {
  // Header
  const h = data.now.hour;
  const m = data.now.minute;
  const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
  document.getElementById("clock-time").textContent =
    `${h12}:${String(m).padStart(2, "0")}`;
  document.getElementById("clock-ampm").textContent = h >= 12 ? "PM" : "AM";
  // Date in CAPS, abbreviated. e.g. "WED · APR 29"
  document.getElementById("clock-date").textContent =
    data.date.replace(",", " ·").toUpperCase();

  // NEXT hero
  if (data.next) {
    document.getElementById("next-label").textContent = "Next in";
    document.getElementById("hero-num").textContent = String(data.next.minutesUntil);
    document.getElementById("hero-unit").textContent = "Min";
    document.getElementById("next-title").textContent = data.next.title;
    const startStr = formatHourParts(data.next.startHour, data.next.startMinute);
    // Build "AT 11:00 PM · TEAM-ENG" with the numeric portion wrapped in
    // a mono span. innerHTML is safe here — startStr.html is engineered,
    // subtitle is escaped via textContent below.
    const meta = document.getElementById("next-meta");
    meta.innerHTML = `AT <span class="num">${startStr.numHtml}</span> ${startStr.unit}`;
    if (data.next.subtitle) {
      meta.appendChild(document.createTextNode(" · "));
      const subSpan = document.createElement("span");
      subSpan.textContent = data.next.subtitle;
      meta.appendChild(subSpan);
    }

    // Imminent state (<5 min): hero block flips to red panel.
    document.getElementById("hero").classList.toggle("imminent", data.next.minutesUntil < 5);

    // Depletion bar visible at <30 min and >=5 min. Width = (minutesUntil / 30) * 100%.
    const bar = document.getElementById("hero-bar");
    if (data.next.minutesUntil < 30 && data.next.minutesUntil >= 5) {
      bar.style.width = Math.max(0, Math.min(100, (data.next.minutesUntil / 30) * 100)) + "%";
    } else {
      bar.style.width = "0%";
    }
  } else {
    // Empty-state: minimal "done for today" reading. Out of scope per PRD parking lot —
    // this is a placeholder until the proper rest-view ships.
    document.getElementById("next-label").textContent = "Done";
    document.getElementById("hero-num").textContent = "—";
    document.getElementById("hero-unit").textContent = "";
    document.getElementById("next-title").textContent = "No more meetings today";
    document.getElementById("next-meta").textContent = "";
    document.getElementById("hero").classList.remove("imminent");
    document.getElementById("hero-bar").style.width = "0%";
  }

  renderRail(data);
}

function formatHour(h, m) {
  const period = h >= 12 ? "PM" : "AM";
  const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
  return `${h12}:${String(m).padStart(2, "0")} ${period}`;
}

// Returns the parts of a formatted time so the numeric portion can be
// rendered in a mono span and the unit (AM/PM) in the label sans.
function formatHourParts(h, m) {
  const period = h >= 12 ? "PM" : "AM";
  const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
  return {
    numHtml: `${h12}:${String(m).padStart(2, "0")}`,
    unit: period,
  };
}

function renderRail(data) {
  const rail = document.getElementById("rail");
  rail.innerHTML = "";

  const start = data.workingHours.start;
  const end = data.workingHours.end;
  // Rail content area: 24px top padding, 24px bottom padding inside the
  // 408px-tall rail. Map [start..end] linearly to that range.
  const top = 24;
  const bottom = 24;
  const usable = 408 - top - bottom; // 360px
  const hours = end - start;
  const pxPerHour = usable / hours;
  const yFor = (h, m) => top + ((h + m/60) - start) * pxPerHour;

  // Hour ticks every 2 hours: start, start+2, ..., end (inclusive).
  // Show AM/PM unit on first tick of each period (so the AM→PM transition
  // is always visible).
  let prevPeriod = null;
  for (let h = start; h <= end; h += 2) {
    const tick = document.createElement("div");
    tick.className = "hour-tick";
    tick.style.top = yFor(h, 0) + "px";
    const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
    const period = h >= 12 ? "PM" : "AM";
    const num = document.createElement("span");
    num.className = "num";
    num.textContent = String(h12);
    tick.appendChild(num);
    if (period !== prevPeriod) {
      tick.appendChild(document.createTextNode(period));
    }
    prevPeriod = period;
    rail.appendChild(tick);
  }

  // Events
  for (const ev of data.events) {
    const startY = yFor(ev.startH, ev.startM);
    const endY = yFor(ev.endH, ev.endM);
    const div = document.createElement("div");
    div.className = "event " + (ev.state || "normal");
    div.style.top = startY + "px";
    // Enforce Principle 9 element-min: at least 40px tall.
    div.style.height = Math.max(40, endY - startY) + "px";
    // Title in a span so text-overflow: ellipsis works.
    const title = document.createElement("span");
    title.className = "event-title";
    title.textContent = ev.title;
    div.appendChild(title);
    rail.appendChild(div);
  }

  // NOW marker — red rectangle on the rail's right edge.
  const nowY = yFor(data.now.hour, data.now.minute);
  const marker = document.createElement("div");
  marker.className = "now-marker";
  marker.style.top = nowY + "px";
  rail.appendChild(marker);
}

render(SAMPLE);
</script>

</body>
</html>
