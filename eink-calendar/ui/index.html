<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Time Blind Reminder</title>

<!-- Webfonts. The renderer's `document.fonts.ready` wait gates the screenshot
     on these landing — without it the PNG ships a fallback face. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Doto:wght@700&family=Inter:wght@500;600&family=Space+Mono:wght@400;700&display=swap">

<style>
  /* The render canvas is exactly the e-paper resolution.
     Open this file in a browser to preview the design.
     The Python renderer screenshots #canvas at 800x480. */
  html, body {
    margin: 0;
    padding: 0;
    background: #d0cec5;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  /* Mock device bezel — only visible in browser preview. */
  .bezel {
    background: #2A2724;
    padding: 24px;
    border-radius: 22px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }

  /* The actual e-ink canvas. 800x480, fixed. */
  #canvas {
    width: 800px;
    height: 480px;
    background: #EFEBDF;
    color: #1F1B16;
    position: relative;
    overflow: hidden;
    font-feature-settings: "tnum" 1;
    box-sizing: border-box;
  }

  /* ============== Header strip ============== */
  .header {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 64px;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #1F1B16;
    box-sizing: border-box;
  }
  .clock {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: #1F1B16;
  }
  .clock .ampm {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-left: 6px;
  }
  .date {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: #1F1B16;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* ============== Left zone: Doto hero countdown ============== */
  .hero-zone {
    position: absolute;
    top: 64px;
    left: 0;
    width: 400px;
    height: 416px;
    padding: 24px 32px 28px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .hero-frame {
    /* The salience-tier red frame. Only red at <30 min and <5 min.
       Drawn as outset border so partial-B/W updates of the digit
       inside don't disturb it. */
    padding: 16px 12px;
    border: 4px solid transparent;
    border-radius: 6px;
    margin: 0 -12px 16px;
    transition: none;
  }
  .hero-frame.imminent { border-color: #B83C2C; border-width: 4px; }
  .hero-frame.alarm { border-color: #B83C2C; border-width: 8px; }

  .hero-num {
    font-family: 'Doto', monospace;
    font-size: 240px;
    font-weight: 700;
    line-height: 0.9;
    color: #1F1B16;
    text-align: center;
    letter-spacing: -0.02em;
    font-feature-settings: "tnum" 1, "zero" 1;
  }
  .hero-bar-wrap {
    height: 8px;
    margin: 14px 0 12px;
    overflow: hidden;
  }
  .hero-bar {
    height: 100%;
    background: #1F1B16;
    border-radius: 6px;
    width: 0;
  }
  .hero-label {
    display: flex;
    align-items: center;
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: #1F1B16;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .hero-label-text {
    /* min-width:0 lets this flex child shrink below its content width
       so text-overflow:ellipsis actually engages on long event titles. */
    flex: 1 1 auto;
    min-width: 0;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .hero-now {
    display: flex;
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: #1F1B16;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 16px;
  }
  .hero-now-text {
    flex: 1 1 auto;
    min-width: 0;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .hero-now .muted { color: #4A4540; }

  /* ============== Right zone: dot-grid day ============== */
  .grid-zone {
    position: absolute;
    top: 64px;
    right: 0;
    width: 400px;
    height: 416px;
    padding: 24px 32px 24px 16px;
    box-sizing: border-box;
    border-left: 2px solid #1F1B16;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
  }

  .grid {
    display: grid;
    grid-template-columns: 32px repeat(8, 1fr);
    gap: 6px;
  }
  .grid-row-label {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: #4A4540;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: right;
    align-self: center;
    padding-right: 4px;
  }
  .cell {
    height: 36px;
    background: #1F1B16;          /* default: filled (past) */
    border-radius: 4px;
    box-sizing: border-box;
    position: relative;
  }
  .cell.future {
    background: transparent;
    border: 2px solid #1F1B16;
  }
  .cell.future-event {
    /* Future event: outlined cell with a smaller filled ink square inside.
       Distinguishes "occupied" cells from empty future cells without
       spending the red salience budget. */
    background: transparent;
    border: 2px solid #1F1B16;
  }
  .cell.future-event::after {
    content: "";
    position: absolute;
    inset: 8px;
    background: #1F1B16;
    border-radius: 2px;
  }
  .cell.future-imminent {
    background: transparent;
    border: 4px solid #B83C2C;    /* imminent (<30 min): red border */
  }
  .cell.future-imminent.alarm {
    border-width: 8px;            /* <5 min: thicker red */
  }
  .cell.now {
    background: #B83C2C;          /* current cell: red fill */
  }

  .grid-cols {
    display: grid;
    grid-template-columns: 32px repeat(8, 1fr);
    gap: 6px;
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: #4A4540;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: center;
  }

  .grid-legend {
    margin-top: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: #4A4540;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="bezel">
  <div id="canvas">

    <!-- Header: clock + date -->
    <div class="header">
      <span class="clock"><span id="clock-time">10:37</span><span class="ampm" id="clock-ampm">AM</span></span>
      <span class="date" id="clock-date">WED · APR 29</span>
    </div>

    <!-- Left zone: Doto hero countdown -->
    <div class="hero-zone">
      <div class="hero-frame" id="hero-frame">
        <div class="hero-num" id="hero-num">23</div>
      </div>
      <div class="hero-bar-wrap" id="hero-bar-wrap">
        <div class="hero-bar" id="hero-bar" style="width: 0%;"></div>
      </div>
      <div class="hero-label">
        <span class="hero-label-text" id="hero-label">MIN UNTIL STANDUP</span>
      </div>
      <div class="hero-now"><span class="hero-now-text" id="hero-now"></span></div>
    </div>

    <!-- Right zone: 8-col × 4-row dot grid -->
    <div class="grid-zone" id="grid-zone">
      <!-- Populated by JS -->
    </div>

  </div>
</div>

<script>
const SAMPLE = {
  now: { hour: 10, minute: 37 },
  date: "Wed, Apr 29",
  workingHours: { start: 9, end: 17 },
  current: {
    title: "Design review with Sara",
    endHour: 10, endMinute: 50,
    minutesLeft: 13
  },
  next: {
    title: "Standup",
    startHour: 11, startMinute: 0,
    minutesUntil: 23,
    subtitle: "team-eng"
  },
  events: [
    { title: "Design review", startH: 10, startM: 0, endH: 10, endM: 50, state: "current" },
    { title: "Standup", startH: 11, startM: 0, endH: 11, endM: 15, state: "imminent" },
    { title: "Lunch", startH: 12, startM: 0, endH: 12, endM: 30, state: "normal" },
    { title: "Focus block", startH: 13, startM: 0, endH: 14, endM: 30, state: "normal" },
    { title: "1:1 with Alex", startH: 15, startM: 0, endH: 15, endM: 30, state: "normal" }
  ]
};

function render(data) {
  // Header — clock + date
  const h = data.now.hour, m = data.now.minute;
  const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
  document.getElementById("clock-time").textContent =
    `${h12}:${String(m).padStart(2, "0")}`;
  document.getElementById("clock-ampm").textContent = h >= 12 ? "PM" : "AM";
  document.getElementById("clock-date").textContent =
    data.date.replace(",", " ·").toUpperCase();

  // Hero countdown
  const hero = document.getElementById("hero-frame");
  const heroNum = document.getElementById("hero-num");
  const heroLabel = document.getElementById("hero-label");
  const bar = document.getElementById("hero-bar");
  const heroNow = document.getElementById("hero-now");

  hero.classList.remove("imminent", "alarm");
  bar.style.width = "0%";

  if (data.next) {
    heroNum.textContent = String(data.next.minutesUntil);
    heroLabel.textContent = `MIN UNTIL ${data.next.title.toUpperCase()}`;

    // Tier 2: <30 min → red frame + ink depletion bar
    // Tier 3: <5 min → thick red frame, no bar (alarm has fired)
    if (data.next.minutesUntil < 5) {
      hero.classList.add("alarm");
    } else if (data.next.minutesUntil < 30) {
      hero.classList.add("imminent");
      bar.style.width = Math.max(0, Math.min(100, (data.next.minutesUntil / 30) * 100)) + "%";
    }
  } else {
    heroNum.textContent = "—";
    heroLabel.textContent = "DONE FOR TODAY";
  }

  // NOW line — current event title (small)
  if (data.current) {
    heroNow.innerHTML = `<span class="muted">NOW · </span>${data.current.title.toUpperCase()} · <span class="muted">${data.current.minutesLeft} MIN LEFT</span>`;
  } else {
    heroNow.innerHTML = `<span class="muted">FREE · NEXT IN ${data.next ? data.next.minutesUntil + " MIN" : "—"}</span>`;
  }

  renderGrid(data);
}

function renderGrid(data) {
  const zone = document.getElementById("grid-zone");
  zone.innerHTML = "";

  const start = data.workingHours.start;
  const end = data.workingHours.end;
  const cols = end - start;        // 8 hours = 8 columns
  const rows = 4;                  // 15-min increments × 4 = 1 hour per column

  // Build the grid as 4 row-groups (each row = a 15-minute offset).
  const grid = document.createElement("div");
  grid.className = "grid";
  for (let r = 0; r < rows; r++) {
    const rowLabel = document.createElement("div");
    rowLabel.className = "grid-row-label";
    rowLabel.textContent = `:${String(r * 15).padStart(2, "0")}`;
    grid.appendChild(rowLabel);

    for (let c = 0; c < cols; c++) {
      const cellH = start + c;
      const cellM = r * 15;
      const cell = document.createElement("div");
      cell.className = "cell " + classifyCell(cellH, cellM, data);
      grid.appendChild(cell);
    }
  }
  zone.appendChild(grid);

  // Hour labels along the bottom of the grid.
  const colsRow = document.createElement("div");
  colsRow.className = "grid-cols";
  const spacer = document.createElement("span");
  colsRow.appendChild(spacer);
  let prevPeriod = null;
  for (let c = 0; c < cols; c++) {
    const h = start + c;
    const h12 = h === 0 ? 12 : (h > 12 ? h - 12 : h);
    const period = h >= 12 ? "P" : "A";
    const lbl = document.createElement("span");
    lbl.textContent = period !== prevPeriod ? `${h12}${period}` : String(h12);
    prevPeriod = period;
    colsRow.appendChild(lbl);
  }
  zone.appendChild(colsRow);

  // Legend
  const legend = document.createElement("div");
  legend.className = "grid-legend";
  legend.innerHTML = "<span>DAY</span><span>" +
    countDoneEvents(data.events) + "/" + data.events.length + " DONE</span>";
  zone.appendChild(legend);
}

// Returns the cell's CSS class suffix based on the cell's time and the data.
function classifyCell(cellH, cellM, data) {
  const cellStart = cellH * 60 + cellM;
  const cellEnd = cellStart + 15;
  const nowMin = data.now.hour * 60 + data.now.minute;

  // Past cell — the default `.cell` style (solid ink fill) is already
  // correct for past cells, so we return an empty class to use that default.
  if (cellEnd <= nowMin) {
    return "";
  }
  // Now cell — contains the current minute
  if (cellStart <= nowMin && nowMin < cellEnd) {
    return "now";
  }
  // Future cell — find any FUTURE event that overlaps. Skip past and
  // current events that happen to bleed into the future portion of a
  // cell (e.g. a current 10:00-10:50 meeting overlapping the 10:45-11:00
  // cell — that cell's user-relevant content is "what's next", which is
  // empty).
  const overlap = data.events.find(e =>
    (e.state === "normal" || e.state === "imminent") &&
    (e.startH * 60 + e.startM) < cellEnd &&
    (e.endH * 60 + e.endM) > cellStart
  );
  if (overlap) {
    if (overlap.state === "imminent") {
      return data.next && data.next.minutesUntil < 5
        ? "future-imminent alarm"
        : "future-imminent";
    }
    return "future-event";
  }
  return "future";
}

function countDoneEvents(events) {
  return events.filter(e => e.state === "past").length;
}

render(SAMPLE);
</script>

</body>
</html>
