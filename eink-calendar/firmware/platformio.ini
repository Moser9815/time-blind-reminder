; PlatformIO config for the e-ink calendar firmware.
;
; Open this directory in VS Code with the PlatformIO extension installed,
; or use the CLI:
;   pio run                # build
;   pio run -t upload      # build + flash over USB-C
;   pio device monitor     # serial monitor
;
; Board: Adafruit Feather ESP32-S3 (4MB Flash / 2MB PSRAM) — product 5477.

[env:adafruit_feather_esp32s3]
platform = espressif32
board = adafruit_feather_esp32s3
framework = arduino

; Native USB-CDC for serial output (the Feather S3 has no USB-to-serial chip;
; the ESP32 itself talks USB).
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; Pin assignments. These match docs/WIRING.md. If you change wiring,
    ; update both places.
    -DPIN_EPD_CS=8
    -DPIN_EPD_DC=9
    -DPIN_EPD_RST=10
    -DPIN_EPD_BUSY=11
    -DPIN_EPD_SCK=36
    -DPIN_EPD_MOSI=35
    -DPIN_BUTTON=13
    ; Keep partition table small so we have room for OTA later.
    -DBOARD_HAS_PSRAM

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; GxEPD2 is the standard Arduino e-paper driver, supports our 7.5" tri-color panel.
; ArduinoJson is overkill here but useful if you ever serve JSON instead of PNG.
lib_deps =
    zinggjm/GxEPD2 @ ^1.6.0
    adafruit/Adafruit GFX Library @ ^1.11.10
